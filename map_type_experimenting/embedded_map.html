<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Map Script Embed</title>
  <script type="module" src="https://js.arcgis.com/5.0/embeddable-components/"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    arcgis-embedded-map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <arcgis-embedded-map
    item-id="c0a7ae92cccd424cbb1c41cf39a29712"
    theme="light"
    basemap-gallery-enabled
    center="-105.60892490146516,47.25643514924968"
    scale="9244648.868618047"
    portal-url="https://headwatersth.maps.arcgis.com">
  </arcgis-embedded-map>
</body>
</html>
