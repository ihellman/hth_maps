<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Hub Locations — Map Comparison</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      gap: 20px;
    }
    .cell {
      position: relative;
    }
    .cell h2 {
      margin: 0 0 8px 0;
      font-size: 1rem;
    }
    #viewDiv {
      height: 450px;
      width: 100%;
      position: relative;
    }
    .map-iframe {
      height: 450px;
      width: 100%;
      border: none;
      display: block;
    }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>
</head>
<body>

  <div class="grid">

    <div class="cell">
      <h2>ArcGIS JavaScript SDK</h2>
      <div id="viewDiv"></div>
    </div>

    <div class="cell">
      <h2>Leaflet</h2>
      <iframe class="map-iframe" src="leaflet_map_styled.html"></iframe>
    </div>

    <div class="cell">
      <h2>ArcGIS Instant App</h2>
      <iframe class="map-iframe" src="https://headwatersth.maps.arcgis.com/apps/instant/basic/index.html?appid=18bcdeed107146feb9748c22454f67f9" allowfullscreen></iframe>
    </div>

  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/widgets/BasemapGallery",
      "esri/widgets/Expand",
      "esri/Basemap",
      "esri/widgets/BasemapGallery/support/LocalBasemapsSource"
    ], function(Map, MapView, FeatureLayer, BasemapGallery, Expand, Basemap, LocalBasemapsSource) {

      const map = new Map({ basemap: "topo-vector" });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-105.5, 46.5],
        zoom: 6
      });

      map.add(new FeatureLayer({
        portalItem: { id: "0bc653997bea4770b409673a83a22371" }
      }));

      const bgExpand = new Expand({
        view: view,
        content: new BasemapGallery({
          view: view,
          source: new LocalBasemapsSource({
            basemaps: [
              Basemap.fromId("topo-vector"),
              Basemap.fromId("hybrid")
            ]
          })
        }),
        expandIconClass: "esri-icon-basemap",
        autoCollapse: true
      });
      view.ui.add(bgExpand, "top-right");

    });
  </script>

</body>
</html>
