<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map — Styled</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script>
    var esriTopo = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
      { attribution: "Tiles &copy; Esri" }
    );

    var esriImagery = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { attribution: "Tiles &copy; Esri" }
    );

    var BOUNDARY_MIN_ZOOM = 10;

    var map = L.map("map", { layers: [esriTopo] }).setView([46.5, -108], 6);

    L.control.layers(
      { "Topographic": esriTopo, "Imagery": esriImagery },
      null,
      { collapsed: true }
    ).addTo(map);

    fetch("data/th_points.geojson")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var pointsLayer = L.geoJSON(data, {
          pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
              radius: 8,
              color: "#135C66",
              weight: 2,
              fillColor: "#F4C017",
              fillOpacity: 1
            });
          },
          onEachFeature: function(feature, layer) {
            if (feature.properties && feature.properties.name) {
              layer.bindPopup("<strong>" + feature.properties.name + "</strong>");
            }
          }
        }).addTo(map);

        map.fitBounds(pointsLayer.getBounds(), { padding: [40, 40] });
      });

    var boundaryLayer;
    fetch("data/th_boundaries_simple.geojson")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        boundaryLayer = L.geoJSON(data, {
          style: {
            color: "#135C66",
            weight: 2,
            fillColor: "#135C66",
            fillOpacity: 0.15
          },
          onEachFeature: function(feature, layer) {
            if (feature.properties && feature.properties.site_name) {
              layer.bindPopup("<strong>" + feature.properties.site_name + "</strong>");
            }
          }
        });
        toggleBoundaries();
        map.on("zoomend", toggleBoundaries);
      });

    function toggleBoundaries() {
      if (!boundaryLayer) return;
      if (map.getZoom() >= BOUNDARY_MIN_ZOOM) {
        if (!map.hasLayer(boundaryLayer)) map.addLayer(boundaryLayer);
      } else {
        if (map.hasLayer(boundaryLayer)) map.removeLayer(boundaryLayer);
      }
    }
  </script>

</body>
</html>
